meta:
  name: One Tool to Rule Them All — Workshop (dark)
  link: https://example.org/quarto-workshop

color:
  palette:
    # Neutrals — ink night to paper
    night: "#0F1024"        # background
    night-2: "#171936"      # surfaces (cards, sidebar)
    night-3: "#23254A"      # borders, dividers
    paper-3: "#23254A"      # cross-theme alias for night-3 (used in SCSS as $brand-paper-3)
    paper: "#F2EBE0"        # primary text (warm paper)
    paper-2: "#C8C2BA"      # secondary text
    muted: "#8A8499"        # tertiary text / captions

    # Quartile accents — lifted for dark backgrounds
    indigo: "#A899FF"       # primary
    coral:  "#FF8B7A"       # warm accent
    moss:   "#6BCFB3"       # cool accent (code, success)
    amber:  "#F2C56B"       # signal

    # Tinted surfaces for callouts
    indigo-soft: "#1F1F4D"
    coral-soft:  "#3A1F1F"
    moss-soft:   "#143028"
    amber-soft:  "#3A2D14"

  background: night
  foreground: paper
  primary: indigo
  secondary: paper-2
  tertiary: muted
  success: moss
  info: indigo
  warning: amber
  danger: coral
  light: night-2
  dark: paper

typography:
  fonts:
    - family: Newsreader
      source: google
      weight: [400, 500, 600, 700]
      style: [normal, italic]
    - family: IBM Plex Sans
      source: google
      weight: [400, 500, 600, 700]
      style: [normal, italic]
    - family: IBM Plex Mono
      source: google
      weight: [400, 500, 600]
      style: [normal, italic]

  base:
    family: IBM Plex Sans
    size: 1.0625rem
    line-height: 1.65
    weight: 400

  headings:
    family: Newsreader
    weight: 600
    style: normal
    line-height: 1.15
    color: paper

  monospace:
    family: IBM Plex Mono
    size: 0.92em

  monospace-inline:
    color: moss
    background-color: moss-soft

  monospace-block:
    color: paper
    background-color: night-2

  link:
    color: indigo
    weight: 500
    decoration: underline
