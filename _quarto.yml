project:
  type: website
  output-dir: _site

website:
  title: ""
  page-navigation: false
  repo-url: https://github.com/zalf-lli/LCSfFE-handbook
  repo-actions: [edit]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: foundations/quarto-intro.qmd
        text: Foundations
      - href: use-cases/lab-notebook.qmd
        text: Academic Use Cases
      - href: advanced/templates-and-extensions.qmd
        text: Advanced Topics
  sidebar:
    logo: false
    style: floating
    search: true
    collapse-level: 1
    contents:
      - section: "Foundations"
        contents:
          - foundations/quarto-intro.qmd
          - foundations/markdown-intro.qmd
          - foundations/yaml-intro.qmd
          - foundations/installing-quarto.qmd
      - section: "Academic Use Cases"
        contents:
          - section: "Documenting Research in Progress"
            href: use-cases/lab-notebook.qmd
            contents:
            - exercises/lab-notebook-exercise.qmd
          - section: "Writing Manuscripts"
            href: use-cases/manuscripts.qmd
            contents:
            - exercises/manuscripts-exercise.qmd
          - section: " Creating Presentations"
            href: use-cases/presentations.qmd
            contents:
            - exercises/presentations-exercise.qmd
          - section: "Creating Project and Personal Websites"
            href: use-cases/websites.qmd
            contents:
            - exercises/websites-exercise.qmd
          - section: "Interactive Dashboards"
            href: use-cases/dashboards.qmd
            contents:
          - exercises/dashboards-exercise.qmd
      - section: "Advanced Topics"
        contents:
          - advanced/templates-and-extensions.qmd
          - advanced/brand-yml.qmd
brand: 
  light: light-brand.yml
  dark: dark-brand.yml
format:
  html:
    theme: styles.scss
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: true
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true

execute:
  echo: true
  warning: false
  message: false
